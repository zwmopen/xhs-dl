plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zwmopen.xhsdl'
    compileSdk 36

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId 'com.zwmopen.xhsdl'
        minSdk 29
        targetSdk 36
        versionCode 110
        versionName '1.1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            // 首个个人分发版使用本机稳定调试密钥签名，保持 APK 可直接安装。
            signingConfig signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
